<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ filename or "Crash Details" }}</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>
        body {
            background-color: #111;
            color: #eee;
            font-family: "Courier New", monospace;
        }

        .log-container {
            background-color: #000;
            color: #0f0;
            padding: 20px;
            border-radius: 6px;
            white-space: pre;        /* preserve formatting */
            font-size: 15px;
            line-height: 1.4;
            overflow-x: auto;
            box-shadow: 0 0 10px #0f0;
        }

        .btn-back {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top navbar-dark" style="background-color: rgb(28, 124, 1); padding: 10px;">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <div></div>
        <h4 class="text-center flex-grow-1" style="margin: 0; color: black; font-weight: bold;">
            {{ filename or "Crash Detected" }}
        </h4>
        <div>
            <a href="{{ url_for('upload_page') }}" class="btn btn-secondary btn-back" style="color: white; background-color: #000;">← Back</a>
            {% if can_proceed %}
            <!-- Call proceed_analysis to restore snapshot into live globals, then redirect to results -->
            <a href="{{ url_for('proceed_analysis') }}" class="btn btn-success btn-back" style="color: white; background-color: rgb(0, 0, 0);">Proceed to Analysis →</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="alert alert-warning" role="alert">
        <strong>Crash detected.
        {% if can_proceed %}
        Partial analysis (counters / UE journeys) is available — use "Proceed to Analysis" to view it.
        {% else %}
        No further analysis available.
        {% endif %}
        </strong>
    </div>

    <div class="log-container">{{ log_text }}</div>
</div>

</body>
</html>
