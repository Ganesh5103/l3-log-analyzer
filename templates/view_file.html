<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ filename }}</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>
        body {
            background-color: #111;
            color: #eee;
            font-family: "Courier New", monospace;
        }

        .log-container {
            background-color: #000;
            color: #0f0;
            padding: 20px;
            border-radius: 6px;
            white-space: pre;        /* IMPORTANT: preserve formatting */
            font-size: 15px;
            line-height: 1.4;
            overflow-x: auto;
            box-shadow: 0 0 10px #0f0;
        }

        .btn-back {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top navbar-dark" style="background-color: rgb(28, 124, 1); padding: 10px;">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        
        <!-- Left empty for symmetry -->
        <div></div>
        
        <!-- Center: File Name -->
        <h4 class="text-center flex-grow-1" style="margin: 0; color: black; font-weight: bold;">
            {{ filename }}
        </h4>
        
    <!-- Right: Back Button -->
    <a href="{{ url_for('view_converted_logs', folder=folder) }}" class="btn btn-secondary btn-back" style="color: white; background-color: #000;">← Back</a>
    </div>
</nav>

<div class="container mt-4">

    <!-- Back Button -->
     
    
    <div class="log-container">{{ log_text }}</div>

</div>

</body>
</html>
