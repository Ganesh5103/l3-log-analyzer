# ====================================================================
# NGINX CONFIGURATION FOR LOG ANALYZER
# ====================================================================
# Location: /etc/nginx/sites-available/log-analyzer
# Enable: sudo ln -s /etc/nginx/sites-available/log-analyzer /etc/nginx/sites-enabled/
# Test: sudo nginx -t
# Reload: sudo systemctl reload nginx

# ====================================================================
# UPSTREAM CONFIGURATION - LOAD BALANCING
# ====================================================================

upstream fastapi_backend {
    # Load balancing method
    least_conn;  # Route to server with least active connections
    
    # Backend servers (adjust ports/IPs as needed)
    server 127.0.0.1:8000 max_fails=3 fail_timeout=30s weight=1;
    server 127.0.0.1:8001 max_fails=3 fail_timeout=30s weight=1;
    server 127.0.0.1:8002 max_fails=3 fail_timeout=30s weight=1;
    server 127.0.0.1:8003 max_fails=3 fail_timeout=30s weight=1;
    server 127.0.0.1:8004 max_fails=3 fail_timeout=30s weight=1;
    
    # Keep-alive connections to backends
    keepalive 64;
}

# ====================================================================
# RATE LIMITING
# ====================================================================

# Define rate limit zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;    # 30 requests per minute per IP
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/m;  # 5 uploads per minute per IP

# Connection limiting
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ====================================================================
# CACHING
# ====================================================================

# Cache for static files
proxy_cache_path /var/cache/nginx/log_analyzer levels=1:2 keys_zone=static_cache:10m max_size=1g inactive=60m use_temp_path=off;

# ====================================================================
# HTTP SERVER (REDIRECT TO HTTPS)
# ====================================================================

server {
    listen 80;
    listen [::]:80;
    server_name log-analyzer.example.com;
    
    # Redirect all HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

# ====================================================================
# HTTPS SERVER (MAIN)
# ====================================================================

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name log-analyzer.example.com;
    
    # SSL Configuration
    ssl_certificate /etc/ssl/certs/log-analyzer.crt;
    ssl_certificate_key /etc/ssl/private/log-analyzer.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # File upload size (1GB for large log files)
    client_max_body_size 1G;
    client_body_buffer_size 128k;
    client_body_timeout 300s;
    
    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;
    
    # Buffer sizes
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    
    # Logging
    access_log /var/log/nginx/log-analyzer-access.log combined;
    error_log /var/log/nginx/log-analyzer-error.log warn;
    
    # ====================================================================
    # STATIC FILES (served by nginx - FAST)
    # ====================================================================
    
    location /static/ {
        alias /var/www/log-analyzer/static/;
        
        # Cache static files aggressively
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        # Enable gzip compression
        gzip on;
        gzip_types text/css application/javascript image/svg+xml;
        gzip_vary on;
        
        # Security
        add_header X-Content-Type-Options "nosniff" always;
    }
    
    # ====================================================================
    # UPLOAD ENDPOINT (rate limited)
    # ====================================================================
    
    location /upload {
        # Apply upload rate limit
        limit_req zone=upload_limit burst=2 nodelay;
        limit_conn conn_limit 10;
        
        # Proxy to FastAPI
        proxy_pass http://fastapi_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable buffering for large uploads
        proxy_request_buffering off;
        
        # Longer timeout for uploads
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
    
    # ====================================================================
    # API ENDPOINTS (rate limited)
    # ====================================================================
    
    location /session/ {
        # Apply API rate limit
        limit_req zone=api_limit burst=10 nodelay;
        
        # Proxy to FastAPI
        proxy_pass http://fastapi_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Enable HTTP/1.1 keep-alive
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Cache successful responses briefly
        proxy_cache static_cache;
        proxy_cache_valid 200 5m;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        add_header X-Cache-Status $upstream_cache_status;
    }
    
    # ====================================================================
    # JOB STATUS ENDPOINT (higher rate limit)
    # ====================================================================
    
    location /job/ {
        # Allow more frequent polling
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://fastapi_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Short cache for job status
        proxy_cache static_cache;
        proxy_cache_valid 200 10s;
        add_header X-Cache-Status $upstream_cache_status;
    }
    
    # ====================================================================
    # WEBSOCKET SUPPORT (for real-time updates)
    # ====================================================================
    
    location /ws {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Long timeout for WebSocket
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
    
    # ====================================================================
    # ROOT AND OTHER ROUTES
    # ====================================================================
    
    location / {
        # Apply general rate limit
        limit_req zone=api_limit burst=10 nodelay;
        
        # Proxy to FastAPI
        proxy_pass http://fastapi_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
    
    # ====================================================================
    # HEALTH CHECK (no rate limiting)
    # ====================================================================
    
    location /health {
        proxy_pass http://fastapi_backend;
        access_log off;
    }
    
    # ====================================================================
    # DENY HIDDEN FILES
    # ====================================================================
    
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

